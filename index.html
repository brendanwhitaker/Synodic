<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Synodic — Data, Research &amp; Trend Reporting</title>
<meta name="theme-color" content="#0E0D11" />
<meta name="robots" content="noindex" />
<meta name="description" content="Synodic — a data &amp; research firm. Trend reporting and foresight." />
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Cdefs%3E%3ClinearGradient%20id='g'%20x1='0'%20y1='0'%20x2='1'%20y2='1'%3E%3Cstop%20offset='0'%20stop-color='%232FD0DE'/%3E%3Cstop%20offset='.5'%20stop-color='%23E24F86'/%3E%3Cstop%20offset='1'%20stop-color='%23FF9E3D'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect%20width='32'%20height='32'%20rx='7'%20fill='%230E0D11'/%3E%3Ccircle%20cx='16'%20cy='16'%20r='8'%20fill='none'%20stroke='url(%23g)'%20stroke-width='3'/%3E%3C/svg%3E" />

<!--
  ─────────────────────────────────────────────────────────────
  SYNODIC · a data & research / trend-reporting firm
  Brand:   iridescent spectrum (cyan → magenta → orange) on a
           deep charcoal field — the aurora of the card backs,
           the gradient wordmark of the cards & Webflow build.
  Rigor:   borrowed from institutional wayfinding — a strict
           three-row grid, tracked all-caps signage, a monospace
           data layer, and corner registration marks.
  FONT · ITC Avant Garde Gothic  (files in ./assets/fonts/)
    • DISPLAY  — geometric Avant Garde, Book→Bold, wordmark + thesis
    • WAYFIND  — the Condensed cuts, tracked all-caps signage
    • DATA     — system monospace, the .io / est / labels
  Falls back to Century Gothic + a monospace stack, so it never
  renders broken.
  ─────────────────────────────────────────────────────────────
-->
<style>
/* ── display: geometric ─────────────────────────────────────── */
@font-face{ font-family:"Avant Garde"; font-weight:200; font-style:normal; font-display:swap;
  src:url("./assets/fonts/ITCAvantGardeStd-XLt.woff2") format("woff2"),url("./assets/fonts/ITCAvantGardeStd-XLt.woff") format("woff"); }
@font-face{ font-family:"Avant Garde"; font-weight:400; font-style:normal; font-display:swap;
  src:url("./assets/fonts/ITCAvantGardeStd-Bk.woff2") format("woff2"),url("./assets/fonts/ITCAvantGardeStd-Bk.woff") format("woff"); }
@font-face{ font-family:"Avant Garde"; font-weight:400; font-style:italic; font-display:swap;
  src:url("./assets/fonts/ITCAvantGardeStd-BkObl.woff2") format("woff2"),url("./assets/fonts/ITCAvantGardeStd-BkObl.woff") format("woff"); }
@font-face{ font-family:"Avant Garde"; font-weight:500; font-style:normal; font-display:swap;
  src:url("./assets/fonts/ITCAvantGardeStd-Md.woff2") format("woff2"),url("./assets/fonts/ITCAvantGardeStd-Md.woff") format("woff"); }
@font-face{ font-family:"Avant Garde"; font-weight:600; font-style:normal; font-display:swap;
  src:url("./assets/fonts/ITCAvantGardeStd-Demi.woff2") format("woff2"),url("./assets/fonts/ITCAvantGardeStd-Demi.woff") format("woff"); }
@font-face{ font-family:"Avant Garde"; font-weight:700; font-style:normal; font-display:swap;
  src:url("./assets/fonts/ITCAvantGardeStd-Bold.woff2") format("woff2"),url("./assets/fonts/ITCAvantGardeStd-Bold.woff") format("woff"); }
/* ── wayfinding: the condensed cuts ─────────────────────────── */
@font-face{ font-family:"Avant Garde Cn"; font-weight:500; font-style:normal; font-display:swap;
  src:url("./assets/fonts/ITCAvantGardeStd-MdCn.woff2") format("woff2"),url("./assets/fonts/ITCAvantGardeStd-MdCn.woff") format("woff"); }
@font-face{ font-family:"Avant Garde Cn"; font-weight:600; font-style:normal; font-display:swap;
  src:url("./assets/fonts/ITCAvantGardeStd-DemiCn.woff2") format("woff2"),url("./assets/fonts/ITCAvantGardeStd-DemiCn.woff") format("woff"); }
@font-face{ font-family:"Avant Garde Cn"; font-weight:700; font-style:normal; font-display:swap;
  src:url("./assets/fonts/ITCAvantGardeStd-BoldCn.woff2") format("woff2"),url("./assets/fonts/ITCAvantGardeStd-BoldCn.woff") format("woff"); }

:root{
  /* field — deep charcoal, warm-neutral (the card stock) */
  --ink:      #0E0D11;
  --ink-2:    #141317;
  --paper:    #F4F1EC;   /* warm off-white, the card wordmark ink */
  --paper-dim:#B9B6B0;
  --paper-fnt:#7C7A78;

  /* the Synodic spectrum — iridescent, cyan → magenta → orange */
  --cyan:   #2FD0DE;
  --blue:   #4A6BF0;
  --violet: #8B4FE6;
  --magenta:#E24F86;
  --coral:  #F25C42;
  --orange: #FF9E3D;
  --spectrum: linear-gradient(95deg,
      var(--cyan) 0%, var(--blue) 20%, var(--violet) 42%,
      var(--magenta) 64%, var(--coral) 82%, var(--orange) 100%);

  /* type */
  --font:    "Avant Garde","Century Gothic","URW Gothic","Questrial",
             system-ui,-apple-system,"Segoe UI",sans-serif;
  --font-cn: "Avant Garde Cn","Avant Garde","Century Gothic",
             system-ui,-apple-system,"Segoe UI",sans-serif;
  --mono:    ui-monospace,"SF Mono","SFMono-Regular",Menlo,"Cascadia Mono",
             "Roboto Mono","DejaVu Sans Mono",monospace;

  /* tracking, tokenised so signage stays consistent */
  --tk-sign:  .28em;   /* wayfinding all-caps */
  --tk-data:  .20em;   /* monospace metadata */
}

*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; }

body{
  font-family:var(--font);
  color:var(--paper);
  background:var(--ink);
  min-height:100svh;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  font-kerning:normal;
}

/* signage utilities ─────────────────────────────────────────── */
.sign{
  font-family:var(--font-cn);
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:var(--tk-sign);
}
.data{
  font-family:var(--mono);
  font-weight:400;
  letter-spacing:var(--tk-data);
  font-variant-numeric:tabular-nums;
  text-transform:uppercase;
}

/* ── field: charcoal + baked-in aurora (also the no-WebGL floor) */
.field-bg{
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(78% 58% at 50% 36%, rgba(120,90,230,.13), transparent 62%),
    radial-gradient(70% 62% at 76% 72%, rgba(242,92,66,.10),  transparent 60%),
    radial-gradient(64% 54% at 22% 74%, rgba(47,208,222,.09), transparent 60%),
    linear-gradient(160deg, #131218 0%, var(--ink) 54%, #08070A 100%);
}

/* ── the living aurora (WebGL, blurred, low) ────────────────── */
#aurora{
  position:fixed; inset:-12%; width:124%; height:124%; z-index:1;
  display:block; pointer-events:none;
  opacity:0; transition:opacity 2s ease .3s;
  filter:blur(72px) saturate(1.02);
  -webkit-mask:radial-gradient(116% 92% at 50% 42%, #000 0%, #000 36%, transparent 82%);
          mask:radial-gradient(116% 92% at 50% 42%, #000 0%, #000 36%, transparent 82%);
}
body.ready #aurora{ opacity:.34; }

/* dark scrim over the aurora — keeps the field charcoal-dominant so
   the wordmark pops and the copy stays legible (the card fronts) */
.scrim{
  position:fixed; inset:0; z-index:2; pointer-events:none;
  background:
    radial-gradient(120% 100% at 50% 44%,
      rgba(9,8,12,0) 0%, rgba(9,8,12,.30) 52%, rgba(6,5,9,.72) 100%),
    linear-gradient(180deg, rgba(9,8,12,.28) 0%, rgba(9,8,12,0) 22% 78%, rgba(9,8,12,.34) 100%);
}

/* ── print grain / speckle (the card texture) ───────────────── */
.grain{
  position:fixed; inset:0; z-index:4; pointer-events:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
  opacity:.045; mix-blend-mode:overlay;
}

/* ── registration frame · wayfinding chrome ─────────────────── */
.frame{
  position:fixed; inset:clamp(12px,2.1vw,26px);
  z-index:5; pointer-events:none;
  opacity:0; transition:opacity 1.4s ease 1.1s;
}
body.ready .frame{ opacity:1; }
.frame .reg{ position:absolute; width:13px; height:13px; }
.frame .reg::before,.frame .reg::after{ content:""; position:absolute; background:rgba(244,241,236,.28); }
.frame .reg::before{ inset:0 auto 0 0; width:1px; height:100%; }
.frame .reg::after{  inset:0 0 auto 0; height:1px; width:100%; }
.frame .tl{ top:0; left:0; }
.frame .tr{ top:0; right:0; transform:scaleX(-1); }
.frame .bl{ bottom:0; left:0; transform:scaleY(-1); }
.frame .br{ bottom:0; right:0; transform:scale(-1); }

/* ── stage grid ─────────────────────────────────────────────── */
.stage{
  position:relative; z-index:3;
  height:100svh;
  display:grid;
  grid-template-rows:auto 1fr auto;
  padding:clamp(24px,3.4vw,46px);
}

/* header ────────────────────────────────────────────────────── */
header.bar{
  display:flex; align-items:flex-start; justify-content:space-between;
  gap:24px;
  padding-bottom:clamp(14px,1.6vw,20px);
  border-bottom:1px solid rgba(244,241,236,.12);
}
.locator{
  display:inline-flex; align-items:center; gap:.62em;
  font-size:clamp(.56rem,.84vw,.68rem);
  letter-spacing:var(--tk-data);
  color:var(--paper-dim);
}
.locator .dot{
  width:7px; height:7px; border-radius:50%;
  background:var(--spectrum); background-size:200% 200%;
  box-shadow:0 0 10px 1px rgba(226,79,134,.5);
  animation:orbit 6s ease-in-out infinite;
}
@keyframes orbit{ 0%,100%{ background-position:0% 50%; } 50%{ background-position:100% 50%; } }
.meta{ text-align:right; display:flex; flex-direction:column; gap:.5em; }
.meta .role{
  font-size:clamp(.56rem,.86vw,.68rem);
  letter-spacing:var(--tk-sign);
  color:var(--paper-dim);
}
.meta .est{
  font-size:clamp(.52rem,.8vw,.64rem);
  letter-spacing:var(--tk-data);
  color:var(--paper-fnt);
}

/* hero ──────────────────────────────────────────────────────── */
.hero{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; gap:clamp(22px,3vw,40px);
}
.wordmark{
  font-weight:700;
  font-size:clamp(3.1rem,14vw,9.5rem);
  line-height:.9;
  letter-spacing:-.015em;
  background:var(--spectrum);
  background-size:220% 100%;
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; color:transparent;
  animation:shimmer 13s ease-in-out infinite;
  opacity:0; transform:translateY(12px) scale(.99);
  transition:opacity 1.2s ease .35s, transform 1.2s cubic-bezier(.2,.7,.2,1) .35s;
}
body.ready .wordmark{ opacity:1; transform:none; }
@keyframes shimmer{ 0%,100%{ background-position:0% 50%; } 50%{ background-position:100% 50%; } }

.rule{
  width:0; height:2px; border-radius:2px;
  background:var(--spectrum); background-size:100% 100%;
  transition:width 1.1s cubic-bezier(.2,.7,.2,1) .85s;
  opacity:.9;
}
body.ready .rule{ width:clamp(56px,7vw,104px); }

.thesis-wrap{
  display:flex; flex-direction:column; align-items:center; gap:clamp(12px,1.4vw,18px);
  opacity:0; transform:translateY(10px);
  transition:opacity 1.1s ease 1s, transform 1.1s ease 1s;
}
body.ready .thesis-wrap{ opacity:1; transform:none; }
.kicker{
  font-size:clamp(.54rem,.8vw,.64rem);
  letter-spacing:var(--tk-data);
  color:var(--paper-dim);
}
.thesis{
  font-weight:400;
  font-size:clamp(1.06rem,2.2vw,1.6rem);
  line-height:1.4;
  letter-spacing:.004em;
  color:#D8D5CF;
  max-width:36ch;
  text-wrap:balance;
  text-shadow:0 1px 24px rgba(6,5,9,.5);
}

/* footer ────────────────────────────────────────────────────── */
footer.gate{
  display:flex; align-items:baseline; justify-content:space-between;
  gap:16px;
  padding-top:clamp(14px,1.6vw,20px);
  border-top:1px solid rgba(244,241,236,.12);
}
.gate .site{
  font-size:clamp(.56rem,.82vw,.68rem);
  letter-spacing:var(--tk-data);
  color:var(--paper-fnt);
}
.gate a.inquire{
  position:relative;
  font-size:clamp(.6rem,.9vw,.74rem);
  letter-spacing:var(--tk-sign);
  color:var(--paper); text-decoration:none; text-transform:uppercase;
  padding-bottom:4px;
}
.gate a.inquire::after{
  content:""; position:absolute; left:0; bottom:0; height:1.5px; width:100%;
  background:var(--spectrum); background-size:200% 100%;
  transform:scaleX(.34); transform-origin:left; opacity:.85;
  transition:transform .4s cubic-bezier(.2,.7,.2,1);
}
.gate a.inquire:hover::after,
.gate a.inquire:focus-visible::after{ transform:scaleX(1); }
.gate a.inquire:focus-visible{ outline:2px solid var(--magenta); outline-offset:5px; }

/* ── mobile: stack, breathe ─────────────────────────────────── */
@media (max-width:640px){
  body{ overflow-y:auto; }
  .stage{ height:auto; min-height:100svh; }
  header.bar{ gap:12px; }
  .meta .role{ letter-spacing:.16em; }
  .hero{ gap:clamp(20px,6vw,34px); padding:clamp(30px,10vw,56px) 0; }
  .wordmark{ font-size:clamp(3rem,19vw,6rem); }
  .thesis{ font-size:clamp(1.02rem,4.8vw,1.3rem); max-width:24ch; }
  footer.gate{ padding-top:16px; }
}

@media (prefers-reduced-motion:reduce){
  #aurora,.wordmark,.rule,.thesis-wrap,.frame{ transition:none; }
  .wordmark,.rule,.thesis-wrap{ opacity:1; transform:none; }
  .rule{ width:clamp(56px,7vw,104px); }
  .wordmark,.locator .dot{ animation:none; }
}
</style>
</head>
<body>
  <div class="field-bg" aria-hidden="true"></div>
  <canvas id="aurora" aria-hidden="true"></canvas>
  <div class="scrim" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <div class="frame" aria-hidden="true">
    <span class="reg tl"></span><span class="reg tr"></span>
    <span class="reg bl"></span><span class="reg br"></span>
  </div>

  <main class="stage">
    <header class="bar">
      <span class="locator data"><span class="dot" aria-hidden="true"></span>synodic.io</span>
      <div class="meta">
        <span class="role sign">Data&nbsp;·&nbsp;Research&nbsp;·&nbsp;Trend&nbsp;Reporting</span>
        <span class="est data">Est.&nbsp;2020</span>
      </div>
    </header>

    <section class="hero">
      <h1 class="wordmark">Synodic</h1>
      <span class="rule" aria-hidden="true"></span>
      <div class="thesis-wrap">
        <span class="kicker data">The&nbsp;thesis</span>
        <!-- Thesis line — swap freely. -->
        <p class="thesis">The trends we trust are the ones we tried to break&nbsp;— and couldn&rsquo;t.</p>
      </div>
    </section>

    <footer class="gate">
      <span class="site data">© 2026 Synodic</span>
      <!-- Replace with your real inbox if it differs -->
      <a class="inquire" href="mailto:hello@synodic.io">Request a briefing</a>
    </footer>
  </main>

<script>
/* ══ living aurora ═════════════════════════════════════════════
   Domain-warped fbm mapped to the Synodic spectrum (cyan → magenta
   → orange). Rendered full-bleed, then blurred + masked in CSS so
   it reads as the soft iridescence of the card backs — motion, not
   detail. WebGL, with the .field-bg gradient as a static fallback. */
(function(){
  const canvas=document.getElementById('aurora');
  const gl=canvas.getContext('webgl')||canvas.getContext('experimental-webgl');
  if(!gl) return;   // .field-bg already carries a static brand aurora

  const vsrc=`attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}`;
  const fsrc=`
  precision highp float;
  uniform vec2 u_res; uniform float u_time;
  float hash(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
  float noise(vec2 p){
    vec2 i=floor(p),f=fract(p); vec2 u=f*f*(3.-2.*f);
    float a=hash(i),b=hash(i+vec2(1.,0.)),c=hash(i+vec2(0.,1.)),d=hash(i+vec2(1.,1.));
    return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
  }
  float fbm(vec2 p){
    float v=0.,a=.5; mat2 m=mat2(1.6,1.2,-1.2,1.6);
    for(int i=0;i<5;i++){ v+=a*noise(p); p=m*p; a*=.5; } return v;
  }
  vec3 pal(float t){
    vec3 c0=vec3(.18,.82,.87);   // cyan
    vec3 c1=vec3(.29,.42,.94);   // blue
    vec3 c2=vec3(.55,.31,.90);   // violet
    vec3 c3=vec3(.89,.31,.53);   // magenta
    vec3 c4=vec3(.95,.36,.26);   // coral
    vec3 c5=vec3(1.,.62,.24);    // orange
    t=fract(t); float x=t*5.;
    if(x<1.) return mix(c0,c1,x);
    else if(x<2.) return mix(c1,c2,x-1.);
    else if(x<3.) return mix(c2,c3,x-2.);
    else if(x<4.) return mix(c3,c4,x-3.);
    return mix(c4,c5,x-4.);
  }
  void main(){
    vec2 uv=gl_FragCoord.xy/u_res.xy;
    vec2 pp=uv; pp.x*=u_res.x/u_res.y;
    float t=u_time*0.045;                     // slow drift
    vec2 q=vec2(fbm(pp*1.8+vec2(0.,t)), fbm(pp*1.8+vec2(5.2,1.3)-t*.7));
    vec2 r=vec2(fbm(pp*1.8+3.*q+vec2(1.7,9.2)+t*.5), fbm(pp*1.8+3.*q+vec2(8.3,2.8)-t*.4));
    float f=fbm(pp*1.8+3.5*r);
    vec3 col=pal(f*1.5+.12*t+length(q)*.35);
    float sheen=fbm(pp*2.6-t*.6+r*2.);        // oil-on-water iridescence
    col+=.14*vec3(sheen)*smoothstep(.4,.95,sheen);
    col=pow(col,vec3(.92));                    // lift midtones, keep it luminous
    gl_FragColor=vec4(col,1.);
  }`;

  function sh(type,src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){ console.warn(gl.getShaderInfoLog(s)); return null; } return s; }
  const vs=sh(gl.VERTEX_SHADER,vsrc), fs=sh(gl.FRAGMENT_SHADER,fsrc);
  if(!vs||!fs) return;
  const prog=gl.createProgram(); gl.attachShader(prog,vs); gl.attachShader(prog,fs); gl.linkProgram(prog);
  gl.useProgram(prog);

  const buf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1, 3,-1, -1,3]),gl.STATIC_DRAW);
  const loc=gl.getAttribLocation(prog,'p'); gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
  const uRes=gl.getUniformLocation(prog,'u_res'), uTime=gl.getUniformLocation(prog,'u_time');

  let DPR;
  function resize(){
    DPR=Math.min(window.devicePixelRatio||1,1.5);   // blurred anyway — save fill
    const w=canvas.clientWidth,h=canvas.clientHeight;
    canvas.width=Math.max(1,Math.round(w*DPR)); canvas.height=Math.max(1,Math.round(h*DPR));
    gl.viewport(0,0,canvas.width,canvas.height);
    gl.uniform2f(uRes,canvas.width,canvas.height);
  }
  window.addEventListener('resize',()=>{ clearTimeout(canvas._t); canvas._t=setTimeout(resize,150); });
  resize();

  const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  const start=performance.now();
  function frame(now){
    gl.uniform1f(uTime,(now-start)/1000);
    gl.drawArrays(gl.TRIANGLES,0,3);
    if(!reduce) requestAnimationFrame(frame);
  }
  if(reduce){ gl.uniform1f(uTime,80); gl.drawArrays(gl.TRIANGLES,0,3); }
  else requestAnimationFrame(frame);
})();

/* reveal */
requestAnimationFrame(()=>requestAnimationFrame(()=>document.body.classList.add('ready')));
</script>
</body>
</html>
