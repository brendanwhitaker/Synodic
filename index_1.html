<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Synodic</title>
<meta name="theme-color" content="#0B0D0E" />
<meta name="robots" content="noindex" />

<!--
  ─────────────────────────────────────────────────────────────
  FONT: ITC Avant Garde Gothic
  Drop your licensed font files into  ./fonts/  and rename the
  src() paths below to match. Two weights are used:
    • 400 (Book)   — thesis + body
    • 500 (Medium) — wordmark + labels
  Until the files are present, the page falls back to Century
  Gothic / a geometric system sans, so it never renders broken.
  ─────────────────────────────────────────────────────────────
-->
<style>
@font-face{
  font-family:"Avant Garde";
  src:url("./fonts/ITCAvantGardeStd-Bk.woff2") format("woff2");
  font-weight:400; font-style:normal; font-display:swap;
}
@font-face{
  font-family:"Avant Garde";
  src:url("./fonts/ITCAvantGardeStd-Md.woff2") format("woff2");
  font-weight:500; font-style:normal; font-display:swap;
}

:root{
  /* architecture */
  --black:      #0B0D0E;   /* near-black, faint blue-green undertone */
  --charcoal:   #17191A;
  --concrete:   #3B3F41;   /* mid concrete grey */
  --concrete-2: #5A5F61;
  --ash:        #D9D7D0;   /* concrete/ash white, cool */
  --ash-dim:    #8C8F8C;

  /* metal — veins only, never surface */
  --copper:     #9C6238;
  --gold:       #C9A24B;
  --gold-hi:    #E7CE8F;

  --font: "Avant Garde","Century Gothic","URW Gothic","Questrial",
          system-ui,-apple-system,"Segoe UI",sans-serif;
}

*{ box-sizing:border-box; margin:0; padding:0; }

html,body{ height:100%; }

body{
  font-family:var(--font);
  color:var(--ash);
  background:var(--black);
  min-height:100svh;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

/* ── concrete field ─────────────────────────────────────────── */
.concrete{
  position:fixed; inset:0; z-index:0;
  /* hard, low, oblique light across poured mass */
  background:
    radial-gradient(120% 90% at 18% 8%,
        rgba(230,232,228,.05) 0%,
        rgba(230,232,228,.015) 26%,
        rgba(0,0,0,0) 55%),
    linear-gradient(152deg,
        #16191A 0%,
        #101314 40%,
        var(--black) 72%,
        #070809 100%);
}
/* fine board-formed grain */
.concrete::before{
  content:""; position:absolute; inset:0;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
  opacity:.05; mix-blend-mode:overlay;
}
/* faint form-tie hole grid — hint of board-formed concrete */
.concrete::after{
  content:""; position:absolute; inset:0;
  background-image:radial-gradient(circle, rgba(0,0,0,.32) 1px, transparent 1.6px);
  background-size:132px 132px;
  background-position:22px 30px;
  opacity:.28;
}

/* ── gold vein canvas (belongs to the concrete) ─────────────── */
#veins{
  position:fixed; inset:0; z-index:1;
  width:100%; height:100%;
  opacity:0; transition:opacity 1.8s ease 0.5s;
  pointer-events:none;
}
body.ready #veins{ opacity:1; }

/* ── the aperture (fluid contained by architecture) ─────────── */
.stage{
  position:relative; z-index:2;
  height:100svh;
  display:grid;
  grid-template-rows:auto 1fr auto;
  padding:clamp(20px,3.2vw,42px);
}

header.bar{
  display:flex; align-items:baseline; justify-content:space-between;
  padding-bottom:clamp(14px,1.6vw,20px);
  border-bottom:1px solid rgba(217,215,208,.12);
}
.wordmark{
  font-weight:500;
  font-size:clamp(1rem,1.9vw,1.35rem);
  letter-spacing:.42em;
  padding-left:.42em;         /* optical: tracking pushes right edge */
  color:var(--ash);
}
.est{
  font-weight:500;
  font-size:clamp(.6rem,.86vw,.72rem);
  letter-spacing:.34em;
  color:var(--ash-dim);
  white-space:nowrap;
}

.field{ position:relative; }

.aperture{
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:clamp(168px,21vw,286px);
  height:clamp(300px,58vh,600px);
  /* cut into the mass */
  box-shadow:
     0 0 0 1px rgba(0,0,0,.7),
     inset 0 0 0 1px rgba(0,0,0,.85),
     0 30px 90px -30px rgba(0,0,0,.9),
     0 2px 0 0 rgba(230,232,228,.05);
  overflow:hidden;
  background:#050607;
  clip-path:inset(0);
}
#fluid{ position:absolute; inset:0; width:100%; height:100%; display:block;
  opacity:0; transition:opacity 1.9s ease 0.2s; }
body.ready #fluid{ opacity:1; }
/* CSS fallback flow, shown only if WebGL never initializes */
.aperture.fallback #fluid{ display:none; }
.aperture.fallback::after{
  content:""; position:absolute; inset:0;
  background:linear-gradient(200deg,#0e6b4f,#0c6e7a,#1b3a8f,#2e1e6b,#6b2a8a,#7a1030);
  background-size:200% 200%;
  animation:drift 26s ease-in-out infinite;
}
@keyframes drift{
  0%,100%{ background-position:0% 20%; }
  50%{ background-position:100% 80%; }
}
/* thin gold lip where the aperture meets the concrete */
.aperture::before{
  content:""; position:absolute; inset:0; z-index:2; pointer-events:none;
  box-shadow:inset 0 0 22px 1px rgba(0,0,0,.55);
  border-left:1px solid rgba(201,162,75,.28);
  border-right:1px solid rgba(156,98,56,.22);
}

.thesis{
  position:absolute;
  left:0; bottom:2px;
  max-width:min(42ch,44vw);
  font-weight:400;
  font-size:clamp(1.32rem,3vw,2.5rem);
  line-height:1.28;
  letter-spacing:.005em;
  color:var(--ash);
  opacity:0; transform:translateY(10px);
  transition:opacity 1.1s ease 0.9s, transform 1.1s ease 0.9s;
}
body.ready .thesis{ opacity:1; transform:none; }

footer.gate{
  display:flex; align-items:baseline; justify-content:space-between;
  padding-top:clamp(14px,1.6vw,20px);
  border-top:1px solid rgba(217,215,208,.12);
  font-size:clamp(.62rem,.9vw,.74rem);
  letter-spacing:.26em;
}
.gate .intro{ color:var(--ash-dim); text-transform:uppercase; }
.gate a{
  color:var(--ash); text-decoration:none;
  text-transform:uppercase;
  border-bottom:1px solid rgba(217,215,208,.28);
  padding-bottom:2px;
  transition:border-color .3s ease, color .3s ease;
}
.gate a:hover{ color:var(--gold-hi); border-color:var(--gold); }
.gate a:focus-visible{
  outline:2px solid var(--gold);
  outline-offset:4px;
}

/* ── mobile: stack, don't overlap ───────────────────────────── */
@media (max-width:640px){
  body{ overflow-y:auto; }
  .stage{ height:auto; min-height:100svh; }
  .field{ display:flex; flex-direction:column; align-items:center;
          justify-content:center; gap:clamp(28px,7vw,40px);
          padding:clamp(34px,10vw,60px) 0; }
  .aperture{ position:relative; top:auto; left:auto; transform:none;
             width:clamp(150px,54vw,230px); height:clamp(280px,64vh,460px); }
  .thesis{ position:relative; bottom:auto; max-width:26ch; text-align:center;
           font-size:clamp(1.3rem,6.6vw,1.9rem); }
}

@media (prefers-reduced-motion:reduce){
  #veins,#fluid,.thesis{ transition:none; }
  .aperture.fallback::after{ animation:none; }
}
</style>
</head>
<body>
  <div class="concrete" aria-hidden="true"></div>
  <canvas id="veins" aria-hidden="true"></canvas>

  <main class="stage">
    <header class="bar">
      <div class="wordmark">SYNODIC</div>
      <div class="est">EST.&nbsp;2020</div>
    </header>

    <div class="field">
      <div class="aperture" id="aperture">
        <canvas id="fluid"></canvas>
      </div>
      <!-- Thesis line — placeholder, swap freely. Meaning at full
           strength; the offer stays offstage. -->
      <p class="thesis">Most people are surprised by alignments that were never unpredictable.</p>
    </div>

    <footer class="gate">
      <span class="intro">By introduction</span>
      <!-- Replace with your real inbox -->
      <a href="mailto:inquiries@synodic.co">Inquiries</a>
    </footer>
  </main>

<script>
/* ══ gold / copper veins ═══════════════════════════════════════
   Procedural filaments through the concrete — line, never surface.
   Seeded so the pattern is stable across reloads. Aperture region
   is left clear: metal belongs to the stone, color to the flow. */
(function(){
  const cv = document.getElementById('veins');
  const ctx = cv.getContext('2d');
  let W,H,DPR;

  // small seeded PRNG (mulberry32)
  function rng(seed){ return function(){
    seed|=0; seed=seed+0x6D2B79F5|0;
    let t=Math.imul(seed^seed>>>15,1|seed);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };}

  function apRect(){
    const el=document.getElementById('aperture').getBoundingClientRect();
    return {x:el.left,y:el.top,w:el.width,h:el.height};
  }
  function inAperture(x,y,ap,pad){
    return x>ap.x-pad && x<ap.x+ap.w+pad && y>ap.y-pad && y<ap.y+ap.h+pad;
  }

  function vein(rand, sx, sy, ang, len, width, ap){
    let x=sx,y=sy,a=ang;
    const grad=ctx.createLinearGradient(x,y,x+Math.cos(a)*len,y+Math.sin(a)*len);
    grad.addColorStop(0,  'rgba(156,98,56,0)');
    grad.addColorStop(.12,'rgba(156,98,56,.55)');   /* copper */
    grad.addColorStop(.5, 'rgba(201,162,75,.85)');  /* gold */
    grad.addColorStop(.82,'rgba(231,206,143,.7)');  /* highlight */
    grad.addColorStop(1,  'rgba(201,162,75,0)');
    ctx.strokeStyle=grad;
    ctx.lineWidth=width;
    ctx.lineCap='round';
    ctx.shadowColor='rgba(201,162,75,.5)';
    ctx.shadowBlur=6;
    ctx.beginPath();
    ctx.moveTo(x,y);
    const steps=Math.max(8,Math.floor(len/14));
    let drawing=true;
    for(let i=0;i<steps;i++){
      a += (rand()-0.5)*0.6;               // wander
      x += Math.cos(a)*(len/steps);
      y += Math.sin(a)*(len/steps);
      if(inAperture(x,y,ap,2)){ drawing=false; ctx.stroke(); break; }
      ctx.lineTo(x,y);
      // occasional branch
      if(rand()<0.12 && width>0.7){
        ctx.stroke(); ctx.beginPath(); ctx.moveTo(x,y);
        vein(rand, x, y, a+(rand()<.5?1:-1)*(0.5+rand()*0.7),
             len*(0.35+rand()*0.3), width*0.6, ap);
        ctx.strokeStyle=grad; ctx.lineWidth=width; ctx.beginPath(); ctx.moveTo(x,y);
      }
    }
    if(drawing) ctx.stroke();
    ctx.shadowBlur=0;
  }

  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    ctx.setTransform(DPR,0,0,DPR,0,0);
    const ap=apRect();
    const rand=rng(1642);                  // the year Galileo dies, Newton born
    const cx=ap.x+ap.w/2, cy=ap.y+ap.h/2;
    const N=Math.round(Math.min(W,900)/64)+7;
    for(let i=0;i<N;i++){
      // seed from screen edges, aim loosely toward the aperture
      const edge=Math.floor(rand()*4);
      let sx,sy;
      if(edge===0){ sx=rand()*W; sy=-10; }
      else if(edge===1){ sx=W+10; sy=rand()*H; }
      else if(edge===2){ sx=rand()*W; sy=H+10; }
      else { sx=-10; sy=rand()*H; }
      const toC=Math.atan2(cy-sy,cx-sx);
      const ang=toC+(rand()-0.5)*1.6;
      const len=(0.28+rand()*0.5)*Math.hypot(W,H)*0.6;
      const w=0.5+rand()*rand()*1.15;
      vein(rand,sx,sy,ang,len,w,ap);
    }
  }

  function resize(){
    DPR=Math.min(window.devicePixelRatio||1,2);
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*DPR; cv.height=H*DPR;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    draw();
  }
  window.addEventListener('resize',()=>{ clearTimeout(cv._t); cv._t=setTimeout(resize,150); });
  resize();
})();

/* ══ jewel fluid simulation (WebGL) ════════════════════════════
   Slow, viscous, oil-slick iridescence — the real dynamics, seen
   through the aperture. Domain-warped fbm mapped to a jewel ramp. */
(function(){
  const canvas=document.getElementById('fluid');
  const ap=document.getElementById('aperture');
  const gl=canvas.getContext('webgl')||canvas.getContext('experimental-webgl');
  if(!gl){ ap.classList.add('fallback'); return; }

  const vsrc=`attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}`;
  const fsrc=`
  precision highp float;
  uniform vec2 u_res; uniform float u_time;
  float hash(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
  float noise(vec2 p){
    vec2 i=floor(p),f=fract(p); vec2 u=f*f*(3.-2.*f);
    float a=hash(i),b=hash(i+vec2(1.,0.)),c=hash(i+vec2(0.,1.)),d=hash(i+vec2(1.,1.));
    return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
  }
  float fbm(vec2 p){
    float v=0.,a=.5; mat2 m=mat2(1.6,1.2,-1.2,1.6);
    for(int i=0;i<5;i++){ v+=a*noise(p); p=m*p; a*=.5; } return v;
  }
  vec3 pal(float t){
    vec3 em=vec3(.05,.42,.30), te=vec3(.04,.40,.46), sa=vec3(.10,.20,.55),
         in_=vec3(.20,.10,.42), am=vec3(.42,.14,.52), ga=vec3(.52,.06,.20);
    t=fract(t); float x=t*5.;
    if(x<1.) return mix(em,te,x);
    else if(x<2.) return mix(te,sa,x-1.);
    else if(x<3.) return mix(sa,in_,x-2.);
    else if(x<4.) return mix(in_,am,x-3.);
    return mix(am,ga,x-4.);
  }
  void main(){
    vec2 uv=gl_FragCoord.xy/u_res.xy;
    vec2 pp=uv; pp.x*=u_res.x/u_res.y;
    float t=u_time*0.03;                    // geological slowness
    vec2 q=vec2(fbm(pp*2.+vec2(0.,t)), fbm(pp*2.+vec2(5.2,1.3)-t*.7));
    vec2 r=vec2(fbm(pp*2.+3.*q+vec2(1.7,9.2)+t*.5), fbm(pp*2.+3.*q+vec2(8.3,2.8)-t*.4));
    float f=fbm(pp*2.+3.5*r);
    vec3 col=pal(f*1.4+.1*t+length(q)*.3);
    float sheen=fbm(pp*3.-t*.6+r*2.);       // oil-on-water iridescence
    col+=.12*vec3(sheen*.6,sheen*.4,sheen)*smoothstep(.4,.9,sheen);
    col*=.9; col=pow(col,vec3(.95));
    gl_FragColor=vec4(col,1.);
  }`;

  function sh(type,src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){ console.warn(gl.getShaderInfoLog(s)); return null; } return s; }
  const vs=sh(gl.VERTEX_SHADER,vsrc), fs=sh(gl.FRAGMENT_SHADER,fsrc);
  if(!vs||!fs){ ap.classList.add('fallback'); return; }
  const prog=gl.createProgram(); gl.attachShader(prog,vs); gl.attachShader(prog,fs); gl.linkProgram(prog);
  gl.useProgram(prog);

  const buf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1, 3,-1, -1,3]),gl.STATIC_DRAW);
  const loc=gl.getAttribLocation(prog,'p'); gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
  const uRes=gl.getUniformLocation(prog,'u_res'), uTime=gl.getUniformLocation(prog,'u_time');

  let DPR;
  function resize(){
    DPR=Math.min(window.devicePixelRatio||1,2);
    const w=ap.clientWidth,h=ap.clientHeight;
    canvas.width=Math.max(1,w*DPR); canvas.height=Math.max(1,h*DPR);
    gl.viewport(0,0,canvas.width,canvas.height);
    gl.uniform2f(uRes,canvas.width,canvas.height);
  }
  window.addEventListener('resize',()=>{ clearTimeout(canvas._t); canvas._t=setTimeout(resize,150); });
  resize();

  const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  const start=performance.now();
  function frame(now){
    gl.uniform1f(uTime,(now-start)/1000);
    gl.drawArrays(gl.TRIANGLES,0,3);
    if(!reduce) requestAnimationFrame(frame);
  }
  if(reduce){ gl.uniform1f(uTime,120); gl.drawArrays(gl.TRIANGLES,0,3); }
  else requestAnimationFrame(frame);
})();

/* reveal */
requestAnimationFrame(()=>requestAnimationFrame(()=>document.body.classList.add('ready')));
</script>
</body>
</html>
